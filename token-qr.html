<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Token → Handy senden</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0a1628;color:#f0f6fc;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:16px}
  h1{color:#e8b84b;font-size:20px;margin:0}
  p{color:#7a9ab8;font-size:13px;text-align:center;max-width:400px;line-height:1.5}
  input{width:100%;max-width:500px;padding:12px;border-radius:10px;border:1px solid #0e3460;background:rgba(14,52,96,.4);color:#f0f6fc;font-size:13px;font-family:monospace}
  button{padding:12px 24px;border-radius:10px;border:none;background:#0a8a6e;color:white;font-size:14px;font-weight:bold;cursor:pointer}
  #qrbox{background:white;padding:16px;border-radius:14px;display:none;text-align:center}
  #qrbox img{display:block}
  #urlbox{font-size:11px;color:#7a9ab8;word-break:break-all;max-width:500px;text-align:center;display:none}
  .warn{color:#e8b84b;font-size:11px;text-align:center;max-width:400px}
</style>
</head>
<body>
<h1>🔑 Token aufs Handy senden</h1>
<p>Füge deinen GitHub Token ein – es wird ein QR-Code generiert den du mit dem Handy scannst. Der Token wird <b>nur lokal</b> verarbeitet, nichts wird übertragen.</p>
<input id="tokenIn" type="password" placeholder="github_pat_..." />
<button onclick="generate()">QR-Code generieren</button>
<div id="qrbox"><img id="qrimg" alt="QR-Code"/></div>
<div id="urlbox"></div>
<p class="warn">⚠️ QR-Code nach dem Scannen sofort schließen. Token nicht teilen!</p>

<script>
function generate(){
  const token = document.getElementById('tokenIn').value.trim();
  if(!token){ alert('Bitte Token eingeben'); return; }
  const url = 'https://fbsgn.github.io/angelkarte/?token=' + encodeURIComponent(token);
  // Google Chart API – rendert QR-Code als PNG, komplett clientseitig über URL
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&ecc=M&data=' + encodeURIComponent(url);
  const img = document.getElementById('qrimg');
  img.src = qrUrl;
  img.width = 280;
  img.height = 280;
  document.getElementById('qrbox').style.display = 'block';
  document.getElementById('urlbox').style.display = 'block';
  document.getElementById('urlbox').textContent = url.slice(0,80) + '…';
}
</script>
</body>
</html>
